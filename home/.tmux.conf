# Terminal colors — inherit from parent terminal, enable true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Pane borders
set -g pane-border-style default
set -g pane-active-border-style fg=colour45

# Reset pane backgrounds to terminal default
set -g window-style default
set -g window-active-style default

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style default
set -g status-left '#[fg=colour255,bg=colour63,bold] #S #[default] '
set -g status-right ''
set -g status-left-length 20
set -g status-right-length 30

# Mouse
set -g mouse on

# Custom kill-session
bind X confirm-before -p "kill session? (y/n)" kill-session


# Window tabs
set -g window-status-format ' #I #W '
set -g window-status-current-format '#[fg=colour0,bg=colour45,bold] #I #W '
set -g window-status-separator ''
