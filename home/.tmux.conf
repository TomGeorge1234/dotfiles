# Terminal colors
set -g default-terminal "screen-256color"

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour45

# Reset pane backgrounds to terminal default
set -g window-style default
set -g window-active-style default

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style bg=colour235,fg=colour246
set -g status-left '#[fg=colour0,bg=colour45,bold] #S #[default] '
set -g status-right '#[fg=colour246] %H:%M #[fg=colour15,bold]%d-%b '
set -g status-left-length 20
set -g status-right-length 30

# Window tabs
set -g window-status-format ' #I #W '
set -g window-status-current-format '#[fg=colour0,bg=colour45,bold] #I #W '
set -g window-status-separator ''
